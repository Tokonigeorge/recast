<!DOCTYPE html>
<!-- Test fixture with deliberately planted accessibility violations -->
<html>
<!-- VIOLATION: html-has-lang — missing lang attribute -->
<head>
  <meta charset="utf-8">
  <title>Recast Test Page</title>
</head>
<body>
  <header>
    <h1>Test Page</h1>
    <nav>
      <a href="/">Home</a>
      <a href="/about">About</a>
    </nav>
  </header>

  <main>
    <!-- VIOLATION: image-alt — missing alt on meaningful image -->
    <img src="hero.jpg">

    <!-- VIOLATION: image-alt — decorative image with role="presentation" but no alt -->
    <img src="decoration.svg" role="presentation">

    <!-- VIOLATION: heading-order — skips from h1 to h3 -->
    <h3>Features</h3>

    <!-- VIOLATION: button-name — icon-only button with no accessible name -->
    <button class="icon-btn">
      <svg aria-hidden="true"><path d="M6 6L18 18M6 18L18 6"/></svg>
    </button>

    <!-- VIOLATION: click-without-keyboard — div with onClick but no keyboard handler -->
    <div class="card" onclick="openCard()">
      <p>Click to open this card</p>
    </div>

    <!-- VIOLATION: aria-labelledby-broken — references non-existent ID -->
    <section aria-labelledby="nonexistent-id">
      <p>This section references an ID that doesn't exist.</p>
    </section>

    <!-- VIOLATION: button-has-type — button in form without type -->
    <form>
      <label for="email">Email</label>
      <input type="email" id="email" name="email">
      <button>Cancel</button>
      <button type="submit">Submit</button>
    </form>

    <!-- VIOLATION: aria-hidden-focus — aria-hidden on focusable element -->
    <a href="/hidden-link" aria-hidden="true">Hidden but focusable</a>

    <!-- VIOLATION: duplicate-id -->
    <div id="duplicate">First</div>
    <div id="duplicate">Second</div>

    <!-- CLEAN: Properly accessible dialog for comparison -->
    <dialog aria-label="Edit profile">
      <h2>Edit Profile</h2>
      <form>
        <label for="name">Full name</label>
        <input type="text" id="name" name="name">
        <button type="submit">Save changes</button>
        <button type="button" aria-label="Close dialog">
          <svg aria-hidden="true"><path d="M6 6L18 18M6 18L18 6"/></svg>
        </button>
      </form>
    </dialog>
  </main>

  <footer>
    <p>&copy; 2026 Recast Test</p>
  </footer>
</body>
</html>
